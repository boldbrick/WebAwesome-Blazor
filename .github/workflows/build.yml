name: build-and-pack

on:
  push:
    branches: [ "main", "master", "release-**", "master-**" ]
    tags: [ "wa-blazor-*" ]
  pull_request:
    branches: [ "main", "master", "release-**", "master-**" ]
  workflow_dispatch:

defaults:
  run:
    working-directory: src

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      # on wa-blazor-* tags the tag version must match Version.props - fail loudly instead of shipping a mismatch
      - name: Guard tag version
        if: startsWith(github.ref, 'refs/tags/wa-blazor-')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref }}".Substring("refs/tags/wa-blazor-".Length)
          [xml]$props = Get-Content Version.props
          $propsVersion = ($props.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1).Version
          if ($tagVersion -ne $propsVersion) {
            Write-Error "Tag version '$tagVersion' does not match Version.props version '$propsVersion'"
            exit 1
          }
          Write-Output "Tag version $tagVersion matches Version.props"

      - name: Restore
        run: dotnet restore WebAwesome.slnx /p:Configuration=Release

      - name: Build and pack
        run: dotnet build WebAwesome.slnx --no-restore /p:Configuration=Release

      - name: Test
        run: dotnet test WebAwesome.slnx --no-build /p:Configuration=Release

      # Note a step that "uses" ignores the default working directory
      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: |
            src/output/packages/Release/*.nupkg
            src/output/packages/Release/*.snupkg
          if-no-files-found: error
          overwrite: true

  # Prepared but inert: publishes to nuget.org only when the repository variable
  # NUGET_PUBLISH_ENABLED is set to 'true' (go-live step, see docs/prompts/WA-3.0/hardening-at-beta6-plan.md WP-I).
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/wa-blazor-') && vars.NUGET_PUBLISH_ENABLED == 'true'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: packages

      - name: Push to nuget.org
        working-directory: packages
        run: |
          dotnet nuget push *.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        working-directory: packages
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.Substring("wa-blazor-".Length)
          gh release create $tag (Get-ChildItem *.nupkg, *.snupkg | ForEach-Object { $_.FullName }) `
            --title "Web Awesome Blazor Bindings $version" `
            --notes "See the [changelog](https://github.com/${{ github.repository }}/blob/main/docs/CHANGELOG.md) for details." `
            --verify-tag
