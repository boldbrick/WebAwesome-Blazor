name: deploy-demo

# GitSync maps Plastic /main to git master - deploys on every promotion to the main line
on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: |
            9.0.x
            10.0.x

      # Web Awesome Pro assets for the published demo: set the WA_PRO_CDN_BASE repository
      # VARIABLE to your kit base URL with a literal {version} placeholder, e.g.
      #   https://ka-p.webawesome.com/kit/<kit>/webawesome@{version}
      # The library substitutes its own bound WA version at runtime, so the variable is set
      # once and survives releases untouched. Deliberately a variable, not a secret - the URL
      # ends up verbatim in the published page anyway, and Web Awesome kits are domain-locked.
      # When unset, the demo uses the free CDN and Pro components render inert (their pages
      # carry the Pro badge).
      - name: Configure Pro assets (optional)
        if: vars.WA_PRO_CDN_BASE != ''
        shell: pwsh
        env:
          WA_PRO_CDN_BASE: ${{ vars.WA_PRO_CDN_BASE }}
        run: ./tools/demo/Set-WaProAssets.ps1

      - name: Publish demo
        working-directory: src
        run: dotnet publish WebAwesome.Blazor.Demo/WebAwesome.Blazor.Demo.csproj /p:Configuration=Release

      - name: Prepare static site
        shell: pwsh
        run: |
          $site = "src/output/publish/Apps/wwwroot"
          # GitHub Pages serves under /<repo>/ - rewrite the base href
          $index = Join-Path $site "index.html"
          (Get-Content $index -Raw) -replace '<base href="/" />', '<base href="/WebAwesome-Blazor/" />' | Set-Content $index -Encoding utf8
          # SPA fallback and Jekyll bypass
          Copy-Item $index (Join-Path $site "404.html")
          New-Item -ItemType File -Path (Join-Path $site ".nojekyll") -Force | Out-Null

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: src/output/publish/Apps/wwwroot

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
