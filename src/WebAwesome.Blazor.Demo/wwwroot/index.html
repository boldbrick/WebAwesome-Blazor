<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Awesome Blazor Bindings</title>
    <base href="/" />

    <!-- Web Awesome assets; the version always matches the library version (kept in sync by the upgrade pipeline) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.1.0/dist-cdn/styles/webawesome.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.1.0/dist-cdn/webawesome.loader.js"></script>

    <link rel="stylesheet" href="css/app.css" />

    <!-- demo-local theming helper shared with the server host (WebAwesome.Blazor.Demo.Server) -->
    <script src="js/demo-theme.js"></script>
</head>

<body>
    <div id="app">
        <div class="demo-loading">Loading Web Awesome Blazor demo…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
