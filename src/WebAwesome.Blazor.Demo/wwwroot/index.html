<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Awesome Blazor Bindings</title>
    <base href="/" />

    <!-- Web Awesome assets are emitted by the WebAwesomeAssets component (App.razor) from configuration,
         so the asset source (free CDN by default, Pro kit URL or self-hosted dist via appsettings.Local.json)
         is never hard-coded here and the version always tracks the library version -->

    <link rel="stylesheet" href="css/app.css" />

    <!-- demo-local theming helper shared with the server host (WebAwesome.Blazor.Demo.Server) -->
    <script src="js/demo-theme.js"></script>
</head>

<body>
    <div id="app">
        <div class="demo-loading">Loading Web Awesome Blazor demo…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
