<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Awesome Blazor Bindings</title>
    <base href="/" />

    <!-- Web Awesome assets; the version always matches the library version (kept in sync by the upgrade pipeline) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.0.0-beta.6/dist-cdn/styles/webawesome.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@awesome.me/webawesome@3.0.0-beta.6/dist-cdn/webawesome.loader.js"></script>

    <link rel="stylesheet" href="css/app.css" />

    <script>
        // demo-local theming helper: theme stylesheet swap + wa-dark/wa-light color scheme classes
        window.demoTheme = {
            setDark: function (dark) {
                document.documentElement.classList.toggle('wa-dark', dark);
                document.documentElement.classList.toggle('wa-light', !dark);
            },
            setTheme: function (theme, href) {
                // Web Awesome theme stylesheets scope their rules under a "wa-theme-{name}" class
                // (e.g. ".wa-theme-awesome"), so swapping the <link> alone has no visible effect
                // unless that class is also applied to <html>
                var html = document.documentElement;
                Array.from(html.classList)
                    .filter(function (c) { return c.indexOf('wa-theme-') === 0; })
                    .forEach(function (c) { html.classList.remove(c); });

                let link = document.getElementById('wa-theme');
                if (href) {
                    if (!link) {
                        link = document.createElement('link');
                        link.rel = 'stylesheet';
                        link.id = 'wa-theme';
                        document.head.appendChild(link);
                    }
                    link.href = href;
                    html.classList.add('wa-theme-' + theme);
                }
                else if (link) {
                    link.remove();
                }
            }
        };
    </script>
</head>

<body>
    <div id="app">
        <div class="demo-loading">Loading Web Awesome Blazor demo…</div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
